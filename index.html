<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="We are moving lead provider generating high quality, exclusive and shared moving leads to help moving companies grow."
  />

  <title>Quick Moving Leads</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #3c97d3;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    .form-wrapper {
      background: #efefef;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      color: white;
      font-size: 42px;
    }

    .subtitle {
      text-align: center;
      color: white;
      margin-bottom: 35px;
      font-size: 20px;
    }

    .lead-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lead-form input,
    .lead-form textarea {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
      background: white;
    }

    .lead-form input:focus,
    .lead-form textarea:focus {
      border-color: #3c97d3;
      box-shadow: 0 0 0 3px rgba(60, 151, 211, 0.15);
    }

    .lead-form textarea {
      resize: vertical;
      min-height: 120px;
    }

    .lead-form button {
      background: #5fbc57;
      color: white;
      border: none;
      padding: 18px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .lead-form button:hover {
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 18px;
      }

      .form-wrapper {
        padding: 20px;
      }

      .lead-form input,
      .lead-form textarea {
        font-size: 16px;
        padding: 15px;
      }

      .lead-form button {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Get Quality Moving Leads Fast</h1>
    <p class="subtitle">
      Grow your moving business with high-quality, real-time leads
    </p>

    <div class="form-wrapper">
      <form
        name="moving-leads"
        method="POST"
        data-netlify="true"
        netlify
        class="lead-form"
      >
        <!-- Required for Netlify -->
        <input type="hidden" name="form-name" value="moving-leads" />

        <input
          type="text"
          name="name"
          placeholder="Name"
          required
        />

        <input
          type="email"
          name="email"
          placeholder="Email"
          required
        />

        <input
          type="tel"
          name="phone"
          placeholder="Phone"
          required
        />

        <input
          type="text"
          name="company_name"
          placeholder="Company Name"
          required
        />

        <input
          type="text"
          name="company_zipcode"
          placeholder="Company Zipcode"
          required
        />

        <input
          type="text"
          name="company_address"
          placeholder="Company Address (Optional)"
        />

        <input
          type="text"
          name="usdot"
          placeholder="USDOT (Optional)"
        />

        <textarea
          name="comment"
          placeholder="Comment (Optional)"
        ></textarea>

        <button type="submit">
          Submit
        </button>
      </form>
    </div>
  </div>
</body>
</html>
